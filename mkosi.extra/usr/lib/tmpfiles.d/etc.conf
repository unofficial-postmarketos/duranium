# Populate /etc from factory defaults

# Note: When no target is specified for L directives, systemd-tmpfiles
# automatically links to /usr/share/factory/etc/<path>
#
# Good candidates for symlinking:
# - Files that are rarely user-modified (os-release, mtab)
# - Security-critical files that should track updates (ca-certificates, ssl)
# - System integration files (fonts, xdg menus, ld.so.conf)
# - Files with .d directories for local overrides (ssh configs)
#
# Should NOT be symlinked:
# - Network configuration (/etc/network, /etc/NetworkManager)
# - User/group files (passwd, shadow, group)

# System information files
L /etc/os-release - - - - ../usr/lib/os-release
L+ /etc/mtab - - - - ../proc/self/mounts

# Locale and internationalization
L? /etc/locale.conf

# Login banners
L /etc/issue

# Shell profiles that should track system defaults
L /etc/profile
L /etc/profile.d

# PAM and security configs
L /etc/security
L /etc/environment

# Bash configs (if bash is installed)
L? /etc/bashrc
L? /etc/bash.bashrc
L? /etc/bash.bash_logout

# Certificate stores (critical for security, should track updates)
L? /etc/ca-certificates
L? /etc/crypto-policies
L? /etc/pki
L /etc/ssl

# Debug tools
L /etc/debuginfod

# SSH configuration - base configs track system, use .d dirs for local overrides
L /etc/ssh/ssh_config
L /etc/ssh/ssh_config.d
L /etc/ssh/sshd_config
L /etc/ssh/sshd_config.d

# Font configuration
L /etc/fonts

# XDG menu definitions
L /etc/xdg

# Man page configuration
L /etc/man_db.conf

# Dynamic linker configuration
L /etc/ld.so.conf
L /etc/ld.so.conf.d

# Firmware updates
L /etc/fwupd

# Alpine Stuff
L /etc/apk
L? /etc/conf.d

# Ensure critical directories exist with proper permissions
d /etc 0755 root root -
d /etc/systemd 0755 root root -
d /etc/systemd/system 0755 root root -
d /etc/tmpfiles.d 0755 root root -
d /etc/sysctl.d 0755 root root -
d /etc/modules-load.d 0755 root root -

# Network configuration directories
d /etc/network 0755 root root -
d /etc/NetworkManager 0755 root root -
d /etc/NetworkManager/system-connections 0700 root root -

# User/group files - copy only if missing
# FIXME: User/groups should be from sysuser config...
C /etc/passwd 0644 root root - /usr/share/factory/etc/passwd
C /etc/group 0644 root root - /usr/share/factory/etc/group
C /etc/shadow 0640 root shadow - /usr/share/factory/etc/shadow
C /etc/gshadow 0640 root shadow - /usr/share/factory/etc/gshadow

# Ensure /etc/fstab exists (even if empty)
f /etc/fstab 0644 root root -
