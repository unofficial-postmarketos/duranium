[Distribution]
Distribution=postmarketos
Release=edge

[Build]
ToolsTree=default
History=yes
CacheDirectory=mkosi.cache
Incremental=yes
ToolsTreePackages=
	btrfs-progs

[Output]
OutputDirectory=mkosi.output
SplitArtifacts=partitions
Format=disk
ImageId=postmarketOS
ManifestFormat=json
Output=%i_%v_%a

[Content]
Packages=
	btrfs-progs
	postmarketos-base
	postmarketos-base-systemd
